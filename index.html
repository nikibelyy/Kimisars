<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FIT">
    
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180x180/000000/32d74b?text=FIT">

    <title>FIT</title>
    
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #32d74b; /* Ярко-зеленый Apple Fitness */
            --accent-blue: #00E5FF;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --glass: rgba(28, 28, 30, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Адаптация под челку и нижнюю полосу */
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
        }

        /* Заголовок в стиле Apple */
        .header {
            padding: 20px 0 10px;
            text-align: left;
        }

        .header span {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 5px 0 20px;
        }

        /* Карточка прогресса (Стрик) */
        .summary-card {
            background: linear-gradient(145deg, #2c2c2e, #1c1c1e);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .streak-info h3 {
            margin: 0;
            font-size: 15px;
            color: var(--text-secondary);
        }

        .streak-val {
            font-size: 40px;
            font-weight: 800;
            color: var(--accent);
            margin: 5px 0 0;
        }

        /* Заголовок упражнений */
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title em {
            font-style: normal;
            font-size: 14px;
            color: var(--accent-blue);
            font-weight: 400;
        }

        /* Список упражнений */
        .workout-list {
            flex-grow: 1;
        }

        .exercise-item {
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            transition: transform 0.2s, opacity 0.3s;
        }

        .exercise-item:active { transform: scale(0.98); }

        .checkbox-container {
            width: 28px;
            height: 28px;
            border: 2px solid #3a3a3c;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .exercise-item.checked .checkbox-container {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .exercise-item.checked .checkbox-container::after {
            content: "✓";
            color: #000;
            font-weight: 800;
            font-size: 16px;
        }

        .exercise-item label {
            font-size: 17px;
            font-weight: 500;
            line-height: 1.3;
        }

        .exercise-item.checked label {
            color: var(--text-secondary);
            text-decoration: line-through;
        }

        /* Кнопка снизу */
        .footer-action {
            padding: 20px 0 10px;
        }

        .btn-finish {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            border: none;
            font-size: 17px;
            font-weight: 600;
            background-color: var(--accent);
            color: #000;
            transition: all 0.3s;
        }

        .btn-finish:disabled {
            background-color: #2c2c2e;
            color: #48484a;
        }

        .btn-finish:active:not(:disabled) {
            transform: scale(0.97);
            opacity: 0.8;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exercise-item { animation: fadeIn 0.4s ease forwards; }

    </style>
</head>
<body>

    <header class="header">
        <span id="currentDate">31 МАРТА, ВТОРНИК</span>
        <h1>Активность</h1>
    </header>

    <div class="summary-card">
        <div class="streak-info">
            <h3>ДНЕЙ ПОДРЯД</h3>
            <div class="streak-val" id="streakVal">0</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 24px;">🔥</div>
            <div id="dayLabel" style="font-size: 13px; color: var(--text-secondary); margin-top: 5px;"></div>
        </div>
    </div>

    <div class="section-title">
        Тренировка <em id="workoutName">Загрузка...</em>
    </div>

    <div class="workout-list" id="workoutList">
        </div>

    <footer class="footer-action">
        <button class="btn-finish" id="finishBtn" onclick="completeDay()" disabled>Завершить день</button>
    </footer>

    <script>
        const plans = {
            1: { name: "Ягодицы + Ноги (1)", tasks: ["Приседания (вес тела) — 12–15", "Выпады вперёд — 12 на ногу", "Мостик на скамье — 12–15", "Прыжки на батуте — 3 мин", "Планка — 30 сек"] },
            2: { name: "Руки + Кор (1)", tasks: ["Отжимания (колени/скамья) — 10–12", "Турник / негат. подтягивания — 3–5", "Скручивания на пресс — 15–20", "Груша — 2×1 мин"] },
            3: { name: "Лёгкий день / Кардио", tasks: ["Прыжки на батуте — 5–7 мин", "Растяжка / Планка с ногами — 3–5 мин"] },
            4: { name: "Ягодицы + Ноги (2)", tasks: ["Присед с выпрыгиванием — 10–12", "Мостик на одной ноге — 10 на ногу", "Махи ногой назад — 12–15", "Планка боковая — 20–30 сек"] },
            5: { name: "Руки + Кор (2)", tasks: ["Жим на скамье — 10–12", "Боковая планка (бедро) — 10–12", "Скручивания с поворотом — 15–20", "Груша — 2×1 мин"] },
            6: { name: "Бассейн", tasks: ["Плавание 30–40 мин", "Контрастный душ"] },
            0: { name: "Восстановление", tasks: ["Отдых / Растяжка / Прогулка"] }
        };

        const daysRu = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
        const monthsRu = ["ЯНВАРЯ", "ФЕВРАЛЯ", "МАРТА", "АПРЕЛЯ", "МАЯ", "ИЮНЯ", "ИЮЛЯ", "АВГУСТА", "СЕНТЯБРЯ", "ОКТЯБРЯ", "НОЯБРЯ", "ДЕКАБРЯ"];

        function getTodayKey() { return new Date().getDay(); }
        function getDateKey() { return new Date().toISOString().split('T')[0]; }

        function init() {
            const today = new Date();
            document.getElementById('currentDate').innerText = `${today.getDate()} ${monthsRu[today.getMonth()]}, ${daysRu[today.getDay()].toUpperCase()}`;
            
            const dayKey = getTodayKey();
            const plan = plans[dayKey];
            document.getElementById('workoutName').innerText = plan.name;
            document.getElementById('dayLabel').innerText = daysRu[dayKey];

            const list = document.getElementById('workoutList');
            list.innerHTML = '';
            
            plan.tasks.forEach((task, i) => {
                const item = document.createElement('div');
                item.className = 'exercise-item';
                item.innerHTML = `
                    <div class="checkbox-container"></div>
                    <label>${task}</label>
                `;
                item.onclick = function() {
                    if (localStorage.getItem('lastDate') === getDateKey()) return;
                    this.classList.toggle('checked');
                    updateBtn();
                };
                list.appendChild(item);
            });

            checkStreak();
            updateBtn();
        }

        function updateBtn() {
            const total = document.querySelectorAll('.exercise-item').length;
            const checked = document.querySelectorAll('.exercise-item.checked').length;
            const btn = document.getElementById('finishBtn');
            const isDoneToday = localStorage.getItem('lastDate') === getDateKey();

            if (isDoneToday) {
                btn.disabled = true;
                btn.innerText = "День зачтен ✅";
                document.querySelectorAll('.exercise-item').forEach(el => el.classList.add('checked'));
            } else {
                btn.disabled = checked < total;
                btn.innerText = checked === total ? "Завершить день" : `Выполнено ${checked} из ${total}`;
            }
        }

        function checkStreak() {
            let streak = parseInt(localStorage.getItem('streak')) || 0;
            const lastDate = localStorage.getItem('lastDate');
            const today = getDateKey();
            
            const yest = new Date();
            yest.setDate(yest.getDate() - 1);
            const yestKey = yest.toISOString().split('T')[0];

            // Если пропустили вчера (и не зачли сегодня) - сброс
            if (lastDate && lastDate !== today && lastDate !== yestKey) {
                streak = 0;
                localStorage.setItem('streak', 0);
            }
            document.getElementById('streakVal').innerText = streak;
        }

        function completeDay() {
            let streak = parseInt(localStorage.getItem('streak')) || 0;
            const lastDate = localStorage.getItem('lastDate');
            const today = getDateKey();

            if (lastDate === today) return;

            const yest = new Date();
            yest.setDate(yest.getDate() - 1);
            const yestKey = yest.toISOString().split('T')[0];

            if (lastDate === yestKey || streak === 0) {
                streak++;
            } else {
                streak = 1;
            }

            localStorage.setItem('streak', streak);
            localStorage.setItem('lastDate', today);
            
            init();
        }

        init();
    </script>
</body>
</html>
