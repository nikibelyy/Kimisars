<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ДТП Эксперт</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#0b0b0b;color:white;}
.container{max-width:460px;margin:auto;padding:20px 16px 140px;}
.header{font-size:32px;font-weight:700;margin-bottom:20px;letter-spacing:-0.5px;}
.search input{width:100%;padding:16px;border-radius:14px;border:none;background:#1c1c1e;color:white;font-size:16px;margin-bottom:18px;outline:none;}
.card{background:#151515;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 0 0 1px rgba(255,255,255,0.04),0 10px 30px rgba(0,0,0,0.6);transition:.25s;}
.card:active{transform:scale(.96);}
.name{font-size:18px;font-weight:600;margin-bottom:6px;}
.row{font-size:14px;opacity:.7;margin-top:3px;}
.addBtn{position:fixed;right:20px;bottom:30px;background:white;color:black;border-radius:16px;padding:16px 22px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,0.8);cursor:pointer;}
.callBtn{position:fixed;right:20px;bottom:95px;background:#1f1f1f;color:white;border-radius:16px;padding:16px 22px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,0.8);cursor:pointer;}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;padding:20px;}
.form{background:#151515;border-radius:22px;padding:22px;width:100%;max-width:360px;box-shadow:0 30px 60px rgba(0,0,0,0.8);}
.field{margin-bottom:14px;}
.field label{font-size:12px;opacity:.6;display:block;margin-bottom:4px;}
.field input,.field textarea{width:100%;padding:14px;border-radius:12px;border:none;background:#1c1c1e;color:white;font-size:14px;}
textarea{resize:none;height:80px;}
.form button{width:100%;padding:15px;border:none;border-radius:14px;background:white;color:black;font-size:16px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<div class="container">
<div class="header">ДТП Эксперт</div>
<div class="search"><input id="searchInput" placeholder="Поиск клиента"></div>
<div id="list"></div>
</div>

<div class="callBtn" onclick="openCall()">Колл Центр</div>
<div class="addBtn" onclick="openForm()">Клиент</div>

<div class="modal" id="modal">
<div class="form">
<div class="field"><label>ФИО клиента</label><input id="nameInput"></div>
<div class="field"><label>Марка автомобиля</label><input id="brandInput"></div>
<div class="field"><label>Госномер</label><input id="numberInput"></div>
<div class="field"><label>Телефон</label><input id="phoneInput"></div>
<button onclick="saveClient()">Сохранить</button>
</div>
</div>

<div class="modal" id="callModal">
<div class="form">
<div class="field"><label>Имя клиента</label><input id="callName"></div>
<div class="field"><label>Телефон</label><input id="callPhone"></div>
<div class="field"><label>Комментарий</label><textarea id="callComment"></textarea></div>
<button onclick="sendTelegram()">Открыть Telegram</button>
</div>
</div>

<script>
let clients=JSON.parse(localStorage.getItem("clients"))||[]
let editingId=null
const list=document.getElementById("list")

function saveStorage(){localStorage.setItem("clients",JSON.stringify(clients))}

function render(data){
list.innerHTML=""
data.forEach(c=>{
let card=document.createElement("div")
card.className="card"
card.innerHTML=`
<div class="name">${c.name}</div>
<div class="row">Марка: ${c.brand}</div>
<div class="row">Госномер: ${c.number}</div>
<div class="row">Телефон: ${c.phone}</div>`

card.onclick=()=>openForm(c)

let startX=0
card.addEventListener("touchstart",e=>{startX=e.touches[0].clientX})
card.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX
if(startX-endX>100){
if(confirm("Удалить клиента?")){
clients=clients.filter(x=>x.id!==c.id)
saveStorage()
render(clients)
}}})

list.appendChild(card)
})
}

function openForm(client){
modal.style.display="flex"
if(client){
editingId=client.id
nameInput.value=client.name
brandInput.value=client.brand
numberInput.value=client.number
phoneInput.value=client.phone
}else{
editingId=null
nameInput.value=""
brandInput.value=""
numberInput.value=""
phoneInput.value=""
}
}

function saveClient(){
let n=nameInput.value.trim()
let b=brandInput.value.trim()
let num=numberInput.value.trim()
let p=phoneInput.value.trim()
if(!n||!b||!num||!p)return

if(editingId){
let c=clients.find(x=>x.id===editingId)
c.name=n;c.brand=b;c.number=num;c.phone=p
}else{
clients.push({id:Date.now(),name:n,brand:b,number:num,phone:p})
}

saveStorage()
render(clients)
modal.style.display="none"
}

function openCall(){callModal.style.display="flex"}

function sendTelegram(){
let name=document.getElementById("callName").value
let phone=document.getElementById("callPhone").value
let comment=document.getElementById("callComment").value

let text=`Новый клиент
Имя: ${name}
Телефон: ${phone}
Комментарий: ${comment}`

let url="https://t.me/Irishka_0923?text="+encodeURIComponent(text)
window.open(url,"_blank")
}

searchInput.oninput=e=>{
let q=e.target.value.toLowerCase()
let filtered=clients.filter(c=>
c.name.toLowerCase().includes(q)||
c.number.toLowerCase().includes(q)||
c.phone.toLowerCase().includes(q))
render(filtered)
}

render(clients)
</script>

</body>
</html>
