<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Темщик кликер · хакерская консоль</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at 20% 20%, #0b0f0b, #030503);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Эффект ряби / матричного шума */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.02) 0px, rgba(0,0,0,0.5) 2px, transparent 3px);
            pointer-events: none;
            z-index: 0;
        }

        .glitch-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 680px;
            background: rgba(10, 20, 8, 0.75);
            backdrop-filter: blur(8px);
            border: 2px solid #1c4c1c;
            box-shadow: 0 0 30px #1f9, 0 0 10px #0f0 inset;
            border-radius: 28px;
            padding: 28px 24px;
            transition: box-shadow 0.2s;
        }

        .glitch-panel:hover {
            box-shadow: 0 0 45px #3f0, 0 0 15px #0f0 inset;
        }

        /* Стили авторизации и игры */
        .screen {
            display: flex;
            flex-direction: column;
            gap: 24px;
            color: #b3ffb3;
            text-shadow: 0 0 5px #0f0, 0 0 2px #0a0;
        }

        .hidden {
            display: none !important;
        }

        h1, h2 {
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 2.2rem;
            border-bottom: 2px solid #1f9;
            padding-bottom: 10px;
            margin-bottom: 8px;
            word-break: break-word;
            filter: drop-shadow(0 0 8px #1f9);
            animation: textFlicker 3s infinite;
        }

        h2 {
            font-size: 1.6rem;
            letter-spacing: 4px;
            border-bottom: 1px solid #3a3;
        }

        @keyframes textFlicker {
            0% { opacity: 1; text-shadow: 0 0 5px #0f0; }
            92% { opacity: 1; }
            93% { opacity: 0.3; text-shadow: 0 0 15px #ff0000; }
            94% { opacity: 1; text-shadow: 0 0 5px #0f0; }
            100% { opacity: 1; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 20px 0;
        }

        .input-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 1.1rem;
            color: #8f8;
            letter-spacing: 1px;
        }

        input {
            background: #0f2010;
            border: 2px solid #1c4c1c;
            padding: 14px 18px;
            font-size: 1.2rem;
            color: #3f3;
            font-family: 'Courier New', monospace;
            border-radius: 40px;
            outline: none;
            transition: 0.15s;
            box-shadow: 0 0 8px #1f9 inset;
        }

        input:focus {
            border-color: #6f6;
            box-shadow: 0 0 18px #3f3, 0 0 8px #1f9 inset;
            background: #102010;
        }

        .btn {
            background: transparent;
            border: 3px solid #1f9;
            color: #1f9;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            padding: 16px 20px;
            border-radius: 60px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 8px;
            transition: 0.2s;
            box-shadow: 0 0 20px #1f9;
            backdrop-filter: blur(4px);
            margin-top: 10px;
        }

        .btn:hover {
            background: #1f9;
            color: #030503;
            box-shadow: 0 0 50px #3f3;
            border-color: #cfc;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .small-btn {
            font-size: 1.2rem;
            letter-spacing: 3px;
            padding: 12px 16px;
            border-width: 2px;
            box-shadow: 0 0 12px #1f9;
        }

        .status-bar {
            background: #0f180f;
            border: 2px solid #1c4c1c;
            border-radius: 60px;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 0 15px #1f9 inset;
        }

        .balance {
            font-size: 2.2rem;
            font-weight: bold;
            color: #b3ffb3;
            text-shadow: 0 0 20px #0f0;
            word-break: break-word;
        }

        .click-area {
            display: flex;
            justify-content: center;
            margin: 15px 0 5px;
        }

        .click-btn {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1f4f1f, #0a1f0a);
            border: 6px solid #1f9;
            font-size: 2.8rem;
            font-weight: bold;
            color: #cfc;
            text-shadow: 0 0 25px #0f0;
            letter-spacing: 8px;
            box-shadow: 0 0 70px #1f9, 0 0 20px #0f0 inset;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 3s infinite;
        }

        .click-btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 90px #3f3;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 50px #1f9, 0 0 15px #0f0 inset; }
            50% { box-shadow: 0 0 90px #3f3, 0 0 30px #0f0 inset; }
            100% { box-shadow: 0 0 50px #1f9, 0 0 15px #0f0 inset; }
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin: 16px 0;
        }

        .upgrade-card {
            background: rgba(10, 20, 8, 0.8);
            border: 2px solid #2c5a2c;
            border-radius: 36px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(2px);
            box-shadow: 0 0 15px #1f9;
            transition: 0.15s;
        }

        .upgrade-card:hover {
            border-color: #6f6;
            box-shadow: 0 0 25px #3f3;
        }

        .upgrade-name {
            font-size: 1.6rem;
            color: #cfc;
        }

        .upgrade-desc {
            font-size: 1.1rem;
            color: #8b8;
        }

        .upgrade-price {
            font-size: 1.8rem;
            color: #3f3;
            font-weight: bold;
        }

        .buy-btn {
            background: transparent;
            border: 2px solid #1f9;
            color: #1f9;
            padding: 12px;
            font-size: 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: 0.15s;
            letter-spacing: 4px;
        }

        .buy-btn:hover:not(:disabled) {
            background: #1f9;
            color: #030503;
            box-shadow: 0 0 25px #3f3;
        }

        .buy-btn:disabled {
            opacity: 0.3;
            border-color: #5a5;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logout-btn {
            border-width: 2px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            padding: 10px 20px;
            margin: 0;
            border-color: #c55;
            color: #f66;
            box-shadow: 0 0 15px #f33;
        }

        .logout-btn:hover {
            background: #d44;
            color: #000;
            border-color: #faa;
            box-shadow: 0 0 35px #f33;
        }

        .notification {
            background: #0f200f;
            border: 2px solid #1f9;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 1.2rem;
            color: #cfc;
            text-align: center;
            box-shadow: 0 0 20px #1f9;
            margin-top: 12px;
        }

        .glitch-text {
            animation: glitch 1.5s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -1px); }
            60% { transform: translate(-2px, 3px); }
            80% { transform: translate(2px, 1px); }
            100% { transform: translate(0); }
        }

        .stats {
            font-size: 1.3rem;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        hr {
            border: 1px solid #1c4c1c;
            box-shadow: 0 0 5px #1f9;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div class="glitch-panel">
        <!-- Экран авторизации -->
        <div id="loginScreen" class="screen">
            <h1 class="glitch-text">> ТЕМЩИК_CLICKER v.0x7d5</h1>
            <div class="input-group">
                <div class="input-row">
                    <label>> ЛОГИН_</label>
                    <input type="text" id="usernameInput" placeholder="никнейм" autocomplete="off">
                </div>
                <div class="input-row">
                    <label>> ПАРОЛЬ_</label>
                    <input type="password" id="passwordInput" placeholder="******" autocomplete="off">
                </div>
            </div>
            <button class="btn" id="loginBtn">[ ВОЙТИ ]</button>
            <div class="notification" id="loginMessage">введите данные для входа</div>
        </div>

        <!-- Экран игры (скрыт изначально) -->
        <div id="gameScreen" class="screen hidden">
            <div class="user-header">
                <h2 id="welcomeUser">> ПРИВЕТ, </h2>
                <button class="btn small-btn logout-btn" id="logoutBtn">[ EXIT ]</button>
            </div>

            <div class="status-bar">
                <span class="balance" id="balanceDisplay">0 B</span>
                <div class="stats">
                    <span id="clickPowerDisplay">⚡1</span>
                    <span id="autoDisplay">🤖0</span>
                </div>
            </div>

            <div class="click-area">
                <button class="click-btn" id="clickButton">⏎</button>
            </div>

            <hr>

            <h2>> ТЕМНЫЙ_МАРКЕТ</h2>
            <div class="shop-grid" id="shopContainer">
                <!-- Карточки улучшений заполняются из JS -->
            </div>

            <div id="gameMessage" class="notification">[ СИСТЕМА ] кликай и властвуй</div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- СОСТОЯНИЕ ----------
            let currentUser = null;
            let userData = {
                balance: 0,
                clickMultiplier: 1,      // доход за клик
                autoclickers: 0,
                // уровни для прогрессии цен (храним сколько раз куплено)
                clickLevel: 0,
                autoLevel: 0
            };
            
            let autoInterval = null;
            let previousAutoCount = 0;

            // DOM элементы
            const loginScreen = document.getElementById('loginScreen');
            const gameScreen = document.getElementById('gameScreen');
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const loginMessage = document.getElementById('loginMessage');
            const gameMessage = document.getElementById('gameMessage');
            const welcomeUser = document.getElementById('welcomeUser');
            const balanceDisplay = document.getElementById('balanceDisplay');
            const clickPowerDisplay = document.getElementById('clickPowerDisplay');
            const autoDisplay = document.getElementById('autoDisplay');
            const clickButton = document.getElementById('clickButton');
            const shopContainer = document.getElementById('shopContainer');

            // ---------- ФУНКЦИИ СОХРАНЕНИЯ/ЗАГРУЗКИ ----------
            function getStorageKey() {
                return currentUser ? `clickerData_${currentUser}` : null;
            }

            function saveData() {
                if (!currentUser) return;
                const key = getStorageKey();
                const dataToStore = {
                    balance: userData.balance,
                    clickMultiplier: userData.clickMultiplier,
                    autoclickers: userData.autoclickers,
                    clickLevel: userData.clickLevel,
                    autoLevel: userData.autoLevel
                };
                localStorage.setItem(key, JSON.stringify(dataToStore));
            }

            function loadDataForUser(username) {
                const key = `clickerData_${username}`;
                const raw = localStorage.getItem(key);
                if (raw) {
                    try {
                        const loaded = JSON.parse(raw);
                        // валидация (чтобы не сломать)
                        userData = {
                            balance: loaded.balance ?? 0,
                            clickMultiplier: loaded.clickMultiplier ?? 1,
                            autoclickers: loaded.autoclickers ?? 0,
                            clickLevel: loaded.clickLevel ?? 0,
                            autoLevel: loaded.autoLevel ?? 0
                        };
                    } catch (e) {
                        // если битое — сброс
                        resetUserData();
                    }
                } else {
                    resetUserData();
                }
            }

            function resetUserData() {
                userData = {
                    balance: 0,
                    clickMultiplier: 1,
                    autoclickers: 0,
                    clickLevel: 0,
                    autoLevel: 0
                };
            }

            // ---------- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ----------
            function formatNumber(n) {
                return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
            }

            function updateUI() {
                if (!currentUser) return;
                balanceDisplay.innerText = formatNumber(userData.balance) + ' B';
                clickPowerDisplay.innerText = `⚡${userData.clickMultiplier}`;
                autoDisplay.innerText = `🤖${userData.autoclickers}`;

                // Рендер магазина (каждый раз обновляем карточки)
                renderShop();
            }

            // ---------- РАСЧЕТ ЦЕН (динамическая прогрессия) ----------
            function getClickUpgradePrice() {
                // базовая 12, растет +8 за уровень (чтобы не слишком быстро)
                return 12 + (userData.clickLevel * 8);
            }

            function getAutoUpgradePrice() {
                return 20 + (userData.autoLevel * 15);
            }

            // ---------- МАГАЗИН (рендер) ----------
            function renderShop() {
                if (!shopContainer) return;

                const clickPrice = getClickUpgradePrice();
                const autoPrice = getAutoUpgradePrice();

                const canBuyClick = userData.balance >= clickPrice;
                const canBuyAuto = userData.balance >= autoPrice;

                shopContainer.innerHTML = `
                    <div class="upgrade-card">
                        <span class="upgrade-name">⚡ КАЛИБРОВКА</span>
                        <span class="upgrade-desc">сила клика +1 (ур. ${userData.clickLevel})</span>
                        <span class="upgrade-price">${formatNumber(clickPrice)} B</span>
                        <button class="buy-btn" id="buyClickBtn" ${!canBuyClick ? 'disabled' : ''}>[ КУПИТЬ ]</button>
                    </div>
                    <div class="upgrade-card">
                        <span class="upgrade-name">🤖 БОТ-КЛИКЕР</span>
                        <span class="upgrade-desc">+1 авто/сек (ур. ${userData.autoLevel})</span>
                        <span class="upgrade-price">${formatNumber(autoPrice)} B</span>
                        <button class="buy-btn" id="buyAutoBtn" ${!canBuyAuto ? 'disabled' : ''}>[ КУПИТЬ ]</button>
                    </div>
                `;

                // навешиваем обработчики
                document.getElementById('buyClickBtn')?.addEventListener('click', () => buyUpgrade('click'));
                document.getElementById('buyAutoBtn')?.addEventListener('click', () => buyUpgrade('auto'));
            }

            // ---------- ПОКУПКИ ----------
            function buyUpgrade(type) {
                if (!currentUser) return;

                let price = type === 'click' ? getClickUpgradePrice() : getAutoUpgradePrice();

                if (userData.balance < price) {
                    gameMessage.innerText = '[ ОШИБКА ] недостаточно средств';
                    return;
                }

                // списываем
                userData.balance -= price;

                if (type === 'click') {
                    userData.clickMultiplier += 1;
                    userData.clickLevel += 1;
                    gameMessage.innerText = '[ УСПЕХ ] калибровка +1';
                } else {
                    userData.autoclickers += 1;
                    userData.autoLevel += 1;
                    gameMessage.innerText = '[ УСПЕХ ] бот активирован';
                }

                // сохраняем, обновляем интерфейс
                saveData();
                updateUI();

                // Если авто изменилось — интервал сам подхватит новое значение
            }

            // ---------- КЛИК ----------
            function handleClick() {
                if (!currentUser) return;
                userData.balance += userData.clickMultiplier;
                saveData();
                updateUI();

                // маленькая вспышка сообщения
                gameMessage.innerText = `+${userData.clickMultiplier} BTC`;
                setTimeout(() => {
                    if (currentUser) gameMessage.innerText = '[ СИСТЕМА ] жми ещё';
                }, 300);
            }

            // ---------- АВТОКЛИКЕР (интервал) ----------
            function startAutoInterval() {
                if (autoInterval) clearInterval(autoInterval);
                autoInterval = setInterval(() => {
                    if (!currentUser) return; // если вышел, интервал остановится чуть позже
                    if (userData.autoclickers > 0) {
                        userData.balance += userData.autoclickers * 1; // 1 за каждого бота
                        saveData();
                        updateUI();
                    }
                }, 1000);
            }

            function stopAutoInterval() {
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
            }

            // ---------- АВТОРИЗАЦИЯ ----------
            function login() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim(); // не проверяем, просто для стиля

                if (username === '' || password === '') {
                    loginMessage.innerText = '[ОШИБКА] заполни оба поля, хакер';
                    return;
                }

                if (username.length < 3) {
                    loginMessage.innerText = '[ОШИБКА] логин минимум 3 символа';
                    return;
                }

                // Загружаем или создаём данные пользователя
                currentUser = username;
                loadDataForUser(username);

                // Обновляем интерфейс
                welcomeUser.innerText = `> ПРИВЕТ, ${username.toUpperCase()}`;
                updateUI();

                // Переключаем экраны
                loginScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');

                // Запускаем автокликер, если ещё не запущен
                startAutoInterval();

                // чистим поля
                usernameInput.value = '';
                passwordInput.value = '';
                loginMessage.innerText = 'вход выполнен';
            }

            function logout() {
                stopAutoInterval();
                currentUser = null;
                resetUserData();

                // переключение экранов
                gameScreen.classList.add('hidden');
                loginScreen.classList.remove('hidden');
                loginMessage.innerText = 'сеанс завершён';
            }

            // ---------- ИНИЦИАЛИЗАЦИЯ И СОБЫТИЯ ----------
            window.addEventListener('load', () => {
                // Проверяем, был ли запомнен пользователь? Не будем, лучше чистый вход.
                // Просто рендерим магазин (без данных)
                renderShop();

                // Кнопка входа
                loginBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    login();
                });

                // Enter в полях
                usernameInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') login();
                });
                passwordInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') login();
                });

                // Выход
                logoutBtn.addEventListener('click', logout);

                // Клик по кнопке кликера
                clickButton.addEventListener('click', handleClick);

                // При уходе со страницы сохраняем данные (если пользователь залогинен)
                window.addEventListener('beforeunload', () => {
                    if (currentUser) saveData();
                });
            });

            // Перехватываем изменения размера и прочее — дополнительно сохраняем при действиях.
            // При покупках уже saveData вызывается, при клике тоже.

            // Для красоты: каждые 30 секунд автосохранение
            setInterval(() => {
                if (currentUser) {
                    saveData();
                }
            }, 30000);

        })();
    </script>
</body>
</html>
