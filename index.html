<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДТП-СФЕРА</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:#f2f2f7;
}

/* HEADER */

.header{
padding:20px;
font-size:22px;
font-weight:600;
}

/* SEARCH */

.search{
padding:10px 16px;
}

.search input{
width:100%;
padding:12px;
border-radius:16px;
border:none;
outline:none;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
font-size:16px;
}

/* CLIENT LIST */

.list{
padding:10px 14px 90px 14px;
}

.card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(18px);
border-radius:18px;
padding:14px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.name{
font-weight:600;
font-size:16px;
margin-bottom:4px;
}

.meta{
font-size:14px;
color:#555;
}

/* BUTTONS */

.actions{
margin-top:8px;
}

.actions button{
border:none;
background:#e5e5ea;
padding:6px 10px;
border-radius:10px;
margin-right:6px;
font-size:13px;
}

/* FLOAT BUTTON */

.fab{
position:fixed;
right:18px;
bottom:90px;
width:56px;
height:56px;
border-radius:50%;
background:#007aff;
color:white;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
cursor:pointer;
}

/* BOTTOM NAV */

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(0,0,0,0.05);
}

.nav div{
text-align:center;
font-size:12px;
color:#444;
}

.nav span{
display:block;
font-size:22px;
}

/* ADD FORM MODAL */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.form{
background:white;
border-radius:20px;
padding:20px;
width:85%;
max-width:350px;
}

.form input{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

.form button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
ДТП-СФЕРА
</div>

<div class="search">
<input id="search" placeholder="Поиск по номеру авто">
</div>

<div class="list" id="list"></div>

<div class="fab" onclick="openForm()">+</div>

<div class="nav">
<div><span>💬</span>Чаты</div>
<div><span>👥</span>Контакты</div>
<div><span>⚙️</span>Настройки</div>
<div><span>👤</span>Профиль</div>
</div>

<div class="modal" id="modal">
<div class="form">
<input id="name" placeholder="ФИО">
<input id="brand" placeholder="Марка авто">
<input id="number" placeholder="Госномер">
<input id="phone" placeholder="Телефон">
<button onclick="add()">Добавить</button>
</div>
</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients")) || []

const list = document.getElementById("list")

function render(data){

list.innerHTML=""

data.forEach(c=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="name">${c.name}</div>
<div class="meta">${c.brand}</div>
<div class="meta">${c.number}</div>
<div class="meta">${c.phone}</div>

<div class="actions">
<button onclick="edit(${c.id})">Редактировать</button>
<button onclick="remove(${c.id})">Удалить</button>
</div>
`

list.appendChild(card)

})

}

function save(){
localStorage.setItem("clients",JSON.stringify(clients))
}

function add(){

let name=document.getElementById("name").value
let brand=document.getElementById("brand").value
let number=document.getElementById("number").value
let phone=document.getElementById("phone").value

if(!name||!brand||!number||!phone) return

let id=Date.now()

clients.push({id,name,brand,number,phone})

save()
render(clients)

closeForm()

}

function edit(id){

let c=clients.find(x=>x.id==id)

let name=prompt("ФИО",c.name)
let brand=prompt("Марка",c.brand)
let number=prompt("Госномер",c.number)
let phone=prompt("Телефон",c.phone)

c.name=name
c.brand=brand
c.number=number
c.phone=phone

save()
render(clients)

}

function remove(id){

clients=clients.filter(x=>x.id!=id)

save()
render(clients)

}

document.getElementById("search").oninput=e=>{

let q=e.target.value.toLowerCase()

let filtered=clients.filter(c=>c.number.toLowerCase().includes(q))

render(filtered)

}

function openForm(){
document.getElementById("modal").style.display="flex"
}

function closeForm(){
document.getElementById("modal").style.display="none"
}

render(clients)

</script>

</body>
</html>
