<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>ДТП-СФЕРА</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";

background:#f2f2f7;

overflow-x:hidden;

}

/* CONTAINER */

.container{

max-width:430px;

margin:auto;

padding:env(safe-area-inset-top) 14px 120px;

}

/* HEADER */

.header{

font-size:28px;

font-weight:700;

margin-bottom:10px;

}

/* SEARCH */

.search input{

width:100%;

padding:14px 16px;

border-radius:18px;

border:none;

font-size:16px;

background:white;

box-shadow:0 4px 10px rgba(0,0,0,0.05);

margin-bottom:16px;

}

/* CARD */

.card{

display:flex;

align-items:center;

width:100%;

padding:14px;

background:white;

border-radius:20px;

margin-bottom:10px;

box-shadow:0 6px 16px rgba(0,0,0,0.05);

transition:.2s;

}

.card:active{

transform:scale(.96);

}

/* AVATAR */

.avatar{

width:48px;

height:48px;

border-radius:50%;

color:white;

display:flex;

align-items:center;

justify-content:center;

font-weight:600;

font-size:17px;

margin-right:12px;

}

/* INFO */

.info{

flex:1;

min-width:0;

}

.name{

font-size:16px;

font-weight:600;

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;

}

.meta{

font-size:14px;

color:#666;

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;

}

/* FAB */

.fab{

position:fixed;

right:20px;

bottom:30px;

width:62px;

height:62px;

border-radius:50%;

background:#007AFF;

color:white;

font-size:32px;

display:flex;

align-items:center;

justify-content:center;

box-shadow:0 12px 25px rgba(0,0,0,0.25);

transition:.3s;

}

/* MODAL */

.modal{

position:fixed;

top:0;
left:0;
right:0;
bottom:0;

background:rgba(0,0,0,0.35);

display:none;

align-items:center;

justify-content:center;

padding:20px;

}

/* FORM */

.form{

background:white;

border-radius:24px;

padding:20px;

width:100%;

max-width:380px;

animation:popup .25s;

}

@keyframes popup{

from{
transform:scale(.9);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

/* INPUT */

.field{

margin-bottom:14px;

}

.field label{

font-size:13px;

color:#555;

display:block;

margin-bottom:4px;

}

.field input{

width:100%;

padding:12px;

border-radius:12px;

border:1px solid #ddd;

font-size:15px;

}

/* BUTTON */

.form button{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:#007AFF;

color:white;

font-size:16px;

font-weight:600;

}

/* ANIMATION */

.fade{

animation:fade .25s;

}

@keyframes fade{

from{opacity:0}

to{opacity:1}

}

</style>

</head>

<body>

<div class="container">

<div class="header">ДТП-СФЕРА</div>

<div class="search">

<input id="search" placeholder="Поиск">

</div>

<div id="list"></div>

</div>

<div class="fab" id="fab" onclick="openForm()">+</div>

<div class="modal" id="modal">

<div class="form">

<div class="field">
<label>ФИО клиента</label>
<input id="name">
</div>

<div class="field">
<label>Марка автомобиля</label>
<input id="brand">
</div>

<div class="field">
<label>Госномер</label>
<input id="number">
</div>

<div class="field">
<label>Телефон</label>
<input id="phone">
</div>

<button onclick="saveClient()">Сохранить</button>

</div>

</div>

<script>

let clients=JSON.parse(localStorage.getItem("clients"))||[]

let editingId=null

const list=document.getElementById("list")

function save(){

localStorage.setItem("clients",JSON.stringify(clients))

}

function randomColor(){

const colors=[

"#007AFF",
"#5856D6",
"#FF9500",
"#34C759",
"#FF2D55"

]

return colors[Math.floor(Math.random()*colors.length)]

}

function render(data){

list.innerHTML=""

data.forEach(c=>{

let initials=c.name.split(" ").map(x=>x[0]).join("").slice(0,2)

let card=document.createElement("div")

card.className="card fade"

card.innerHTML=`

<div class="avatar" style="background:${c.color}">${initials}</div>

<div class="info">

<div class="name">${c.name}</div>

<div class="meta">🚗 ${c.brand}</div>

<div class="meta">🔢 ${c.number}</div>

<div class="meta">📞 ${c.phone}</div>

</div>

`

card.onclick=()=>openForm(c)

/* swipe delete */

let startX

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>120){

if(confirm("Удалить клиента?")){

clients=clients.filter(x=>x.id!==c.id)

save()

render(clients)

}

}

})

list.appendChild(card)

})

}

function openForm(client){

modal.style.display="flex"

if(client){

editingId=client.id

name.value=client.name
brand.value=client.brand
number.value=client.number
phone.value=client.phone

}else{

editingId=null

name.value=""
brand.value=""
number.value=""
phone.value=""

}

}

function saveClient(){

let n=name.value
let b=brand.value
let num=number.value
let p=phone.value

if(!n||!b||!num||!p) return

if(editingId){

let c=clients.find(x=>x.id===editingId)

c.name=n
c.brand=b
c.number=num
c.phone=p

}else{

clients.push({

id:Date.now(),

name:n,

brand:b,

number:num,

phone:p,

color:randomColor()

})

}

save()

render(clients)

modal.style.display="none"

}

search.oninput=e=>{

let q=e.target.value.toLowerCase()

let filtered=clients.filter(c=>

c.name.toLowerCase().includes(q) ||

c.number.toLowerCase().includes(q) ||

c.phone.toLowerCase().includes(q)

)

render(filtered)

}

/* hide fab on scroll */

let lastScroll=0

window.addEventListener("scroll",()=>{

let current=window.scrollY

if(current>lastScroll){

fab.style.transform="translateY(120px)"

}else{

fab.style.transform="translateY(0)"

}

lastScroll=current

})

render(clients)

</script>

</body>

</html>
