<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ДТП-СФЕРА</title>

<style>

:root{
--blue:#007AFF;
--bg:#f2f2f7;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:var(--bg);
color:#111;
}

/* SAFE AREA */

.wrapper{
padding-top:env(safe-area-inset-top);
}

/* HEADER */

.header{
font-size:28px;
font-weight:700;
padding:20px 18px 6px;
}

/* SEARCH */

.search{
padding:8px 16px 16px;
}

.search input{
width:100%;
padding:14px 16px;
border-radius:18px;
border:none;
font-size:16px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* LIST */

.list{
padding:0 12px 120px;
}

/* CARD */

.card{
display:flex;
align-items:center;
background:white;
border-radius:22px;
padding:16px;
margin-bottom:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.05);
transition:transform .15s;
}

.card:active{
transform:scale(.97);
}

/* AVATAR */

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:var(--blue);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:18px;
margin-right:14px;
}

/* INFO */

.info{
flex:1;
}

.name{
font-size:17px;
font-weight:600;
margin-bottom:3px;
}

.meta{
font-size:14px;
color:#6b6b6b;
}

/* FAB */

.fab{
position:fixed;
right:20px;
bottom:30px;
width:64px;
height:64px;
border-radius:50%;
background:var(--blue);
color:white;
font-size:34px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 12px 25px rgba(0,0,0,0.25);
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.35);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.form{
background:white;
border-radius:24px;
padding:22px;
width:100%;
max-width:360px;
animation:pop .25s;
}

@keyframes pop{
from{transform:scale(.9);opacity:.7}
to{transform:scale(1);opacity:1}
}

.field{
margin-bottom:16px;
}

.field label{
display:block;
font-size:13px;
color:#666;
margin-bottom:4px;
}

.field input{
width:100%;
padding:13px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

.form button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:var(--blue);
color:white;
font-size:17px;
font-weight:600;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">ДТП-СФЕРА</div>

<div class="search">
<input id="search" placeholder="Поиск">
</div>

<div class="list" id="list"></div>

</div>

<div class="fab" onclick="openForm()">+</div>

<div class="modal" id="modal">

<div class="form">

<div class="field">
<label>ФИО клиента</label>
<input id="name">
</div>

<div class="field">
<label>Марка автомобиля</label>
<input id="brand">
</div>

<div class="field">
<label>Госномер</label>
<input id="number">
</div>

<div class="field">
<label>Телефон</label>
<input id="phone">
</div>

<button onclick="saveClient()">Сохранить</button>

</div>

</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients")) || []
let editingId = null

const list = document.getElementById("list")

function save(){
localStorage.setItem("clients",JSON.stringify(clients))
}

function render(data){

list.innerHTML=""

data.forEach(c=>{

let initials=c.name.split(" ").map(x=>x[0]).join("").slice(0,2)

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="avatar">${initials}</div>

<div class="info">
<div class="name">${c.name}</div>
<div class="meta">🚗 ${c.brand}</div>
<div class="meta">🔢 ${c.number}</div>
<div class="meta">📞 ${c.phone}</div>
</div>
`

card.onclick=()=>openForm(c)

/* SWIPE DELETE */

let startX

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX

if(startX-endX>120){

if(confirm("Удалить клиента?")){
clients=clients.filter(x=>x.id!==c.id)
save()
render(clients)
}

}

})

list.appendChild(card)

})

}

function openForm(client){

modal.style.display="flex"

if(client){

editingId=client.id

name.value=client.name
brand.value=client.brand
number.value=client.number
phone.value=client.phone

}else{

editingId=null

name.value=""
brand.value=""
number.value=""
phone.value=""

}

}

function saveClient(){

let n=name.value
let b=brand.value
let num=number.value
let p=phone.value

if(!n||!b||!num||!p) return

if(editingId){

let c=clients.find(x=>x.id===editingId)

c.name=n
c.brand=b
c.number=num
c.phone=p

}else{

clients.push({
id:Date.now(),
name:n,
brand:b,
number:num,
phone:p
})

}

save()
render(clients)

modal.style.display="none"

}

search.oninput=e=>{

let q=e.target.value.toLowerCase()

let filtered=clients.filter(c=>

c.name.toLowerCase().includes(q)||
c.number.toLowerCase().includes(q)||
c.phone.toLowerCase().includes(q)

)

render(filtered)

}

render(clients)

</script>

</body>
</html>
