<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДТП-СФЕРА</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:#f2f2f7;
overflow-x:hidden;
}

/* HEADER */

.header{
padding:22px 18px 8px 18px;
font-size:24px;
font-weight:600;
}

/* SEARCH */

.search{
padding:8px 16px 14px 16px;
}

.search input{
width:100%;
padding:12px;
border-radius:18px;
border:none;
outline:none;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
font-size:16px;
}

/* LIST */

.list{
padding:0 10px 120px 10px;
}

/* CARD */

.card{
display:flex;
align-items:center;
background:white;
border-radius:18px;
padding:12px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
transition:transform .2s;
}

.card:active{
transform:scale(.97);
}

/* AVATAR */

.avatar{
width:42px;
height:42px;
border-radius:50%;
background:#007aff;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
margin-right:12px;
font-size:15px;
}

/* INFO */

.info{
flex:1;
}

.name{
font-weight:600;
font-size:16px;
}

.meta{
font-size:14px;
color:#666;
}

/* ACTIONS */

.actions{
display:flex;
gap:6px;
}

.actions button{
border:none;
background:#ececec;
padding:6px 8px;
border-radius:8px;
font-size:12px;
}

/* FLOAT BUTTON */

.fab{
position:fixed;
right:18px;
bottom:30px;
width:56px;
height:56px;
border-radius:50%;
background:#007aff;
color:white;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
cursor:pointer;
transition:transform .3s,opacity .3s;
}

/* HIDE BUTTON */

.hide{
transform:translateY(100px);
opacity:0;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.35);
display:none;
align-items:center;
justify-content:center;
}

.form{
background:white;
border-radius:20px;
padding:20px;
width:85%;
max-width:340px;
animation:pop .2s ease;
}

@keyframes pop{
from{transform:scale(.9)}
to{transform:scale(1)}
}

.form input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

.form button{
width:100%;
padding:11px;
border:none;
border-radius:12px;
background:#007aff;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">ДТП-СФЕРА</div>

<div class="search">
<input id="search" placeholder="Поиск по номеру авто">
</div>

<div class="list" id="list"></div>

<div class="fab" id="fab" onclick="openForm()">+</div>

<div class="modal" id="modal">
<div class="form">
<input id="name" placeholder="ФИО">
<input id="brand" placeholder="Марка авто">
<input id="number" placeholder="Госномер">
<input id="phone" placeholder="Телефон">
<button onclick="add()">Добавить</button>
</div>
</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients")) || []

const list = document.getElementById("list")
const fab = document.getElementById("fab")

/* RENDER */

function render(data){

list.innerHTML=""

data.forEach(c=>{

let initials = c.name.split(" ").map(x=>x[0]).join("").slice(0,2)

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="avatar">${initials}</div>

<div class="info">
<div class="name">${c.name}</div>
<div class="meta">🚗 ${c.brand}</div>
<div class="meta">🔢 ${c.number}</div>
<div class="meta">📞 ${c.phone}</div>
</div>

<div class="actions">
<button onclick="edit(${c.id})">✏️</button>
<button onclick="remove(${c.id})">🗑</button>
</div>

`

list.appendChild(card)

})

}

/* SAVE */

function save(){
localStorage.setItem("clients",JSON.stringify(clients))
}

/* ADD */

function add(){

let name=nameInput.value
let brand=brandInput.value
let number=numberInput.value
let phone=phoneInput.value

if(!name||!brand||!number||!phone) return

clients.push({
id:Date.now(),
name,
brand,
number,
phone
})

save()
render(clients)

closeForm()

nameInput.value=""
brandInput.value=""
numberInput.value=""
phoneInput.value=""

}

/* EDIT */

function edit(id){

let c=clients.find(x=>x.id==id)

c.name=prompt("ФИО",c.name)
c.brand=prompt("Марка",c.brand)
c.number=prompt("Номер",c.number)
c.phone=prompt("Телефон",c.phone)

save()
render(clients)

}

/* REMOVE */

function remove(id){

if(confirm("Удалить клиента?")){

clients=clients.filter(x=>x.id!=id)

save()
render(clients)

}

}

/* SEARCH */

search.oninput=e=>{

let q=e.target.value.toLowerCase()

let filtered=clients.filter(c=>c.number.toLowerCase().includes(q))

render(filtered)

}

/* MODAL */

function openForm(){
modal.style.display="flex"
}

function closeForm(){
modal.style.display="none"
}

/* FAB HIDE ON SCROLL */

let lastScroll=0

window.addEventListener("scroll",()=>{

let current=window.scrollY

if(current>lastScroll){
fab.classList.add("hide")
}else{
fab.classList.remove("hide")
}

lastScroll=current

})

render(clients)

</script>

</body>
</html>
