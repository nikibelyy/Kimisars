<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Мой Трекер</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #2c2c2e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 350px;
        }
        h1 { margin-top: 0; font-size: 24px; color: #d0b0ff; }
        .streak-box {
            font-size: 60px;
            font-weight: bold;
            margin: 20px 0;
            color: #ff9f0a;
            text-shadow: 0 0 10px rgba(255, 159, 10, 0.5);
        }
        .btn {
            background: #32d74b;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #636366; color: #aeaeb2; cursor: not-allowed; }
        .status { font-size: 14px; color: #aeaeb2; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Дней без пропусков 🔥</h1>
        <div class="streak-box" id="streakDisplay">0</div>
        <button class="btn" id="actionBtn" onclick="markDone()">Я потренировалась!</button>
        <div class="status" id="statusText">Не забудь отметиться сегодня.</div>
    </div>

    <script>
        // Получаем текущую дату в формате YYYY-MM-DD
        function getTodayString() {
            const today = new Date();
            return `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
        }

        // Получаем вчерашнюю дату
        function getYesterdayString() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            return `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
        }

        function updateUI() {
            let streak = parseInt(localStorage.getItem('myStreak')) || 0;
            let lastDate = localStorage.getItem('lastWorkoutDate');
            let today = getTodayString();
            let yesterday = getYesterdayString();

            // Если последний раз отмечались раньше, чем вчера - стрик сгорает
            if (lastDate !== today && lastDate !== yesterday && lastDate !== null) {
                streak = 0;
                localStorage.setItem('myStreak', streak);
            }

            document.getElementById('streakDisplay').innerText = streak;

            if (lastDate === today) {
                document.getElementById('actionBtn').disabled = true;
                document.getElementById('actionBtn').innerText = "Отмечено ✅";
                document.getElementById('statusText').innerText = "Молодец! Возвращайся завтра.";
            } else {
                document.getElementById('actionBtn').disabled = false;
                document.getElementById('actionBtn').innerText = "Я потренировалась!";
                document.getElementById('statusText').innerText = "Если не нажмешь до конца дня, серия сгорит!";
            }
        }

        function markDone() {
            let streak = parseInt(localStorage.getItem('myStreak')) || 0;
            let lastDate = localStorage.getItem('lastWorkoutDate');
            let today = getTodayString();
            let yesterday = getYesterdayString();

            if (lastDate === today) return; // Уже отмечено

            if (lastDate === yesterday) {
                streak++; // Продолжаем серию
            } else {
                streak = 1; // Начинаем заново
            }

            localStorage.setItem('myStreak', streak);
            localStorage.setItem('lastWorkoutDate', today);
            
            // Легкая вибрация телефона для обратной связи (работает на iPhone в поддерживаемых браузерах)
            if (navigator.vibrate) { navigator.vibrate(50); }
            
            updateUI();
        }

        // Запуск при открытии
        updateUI();
    </script>
</body>
</html>
