<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Мой План</title>
    <style>
        :root {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --accent: #ff9f0a;
            --success: #32d74b;
            --text: #ffffff;
            --secondary: #aeaeb2;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { font-size: 20px; color: #d0b0ff; margin-bottom: 10px; }
        .streak-box {
            font-size: 48px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .streak-label { font-size: 14px; color: var(--secondary); margin-bottom: 20px; }
        
        .plan-title {
            text-align: left;
            font-weight: bold;
            margin: 20px 0 10px 5px;
            color: var(--accent);
            border-bottom: 1px solid #3a3a3c;
            padding-bottom: 5px;
        }

        .task-list { text-align: left; margin-bottom: 25px; }
        .task-item {
            display: flex;
            align-items: center;
            background: #3a3a3c;
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 12px;
            transition: 0.2s;
        }
        .task-item input {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            accent-color: var(--success);
        }
        .task-item.checked { opacity: 0.6; }
        
        .btn {
            background: var(--success);
            color: black;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:disabled {
            background: #48484a;
            color: #8e8e93;
        }
        .status { margin-top: 15px; font-size: 13px; color: var(--secondary); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Дней без пропусков 🔥</h1>
        <div class="streak-box" id="streakDisplay">0</div>
        <div class="streak-label" id="dayName">Сегодня</div>

        <div class="plan-title">План на сегодня:</div>
        <div class="task-list" id="taskList">
            </div>

        <button class="btn" id="actionBtn" onclick="markDayDone()" disabled>Завершить день</button>
        <div class="status" id="statusText">Выполни все пункты, чтобы зачесть день.</div>
    </div>

    <script>
        const plans = {
            1: ["Батут (разминка) 5 мин", "Зашагивания на скамью 3х15", "Болгарские выпады 3х12", "Ягодичный мостик 3х20", "Виброплатформа 5 мин"],
            2: ["Бокс/Груша 20 мин", "Отжимания от скамьи 3х15", "Планка 3х60 сек", "5к+ шагов"],
            3: ["Бассейн (интенсивно)", "5к+ шагов", "Питание 1250 ккал"],
            4: ["Турник (подъем ног) 3х12", "Скручивания 3х20", "Батут 10 мин", "Виброплатформа 5 мин"],
            5: ["Музыкальный бокс 15 мин", "Приседания 3х20", "5к+ шагов", "Питание 1250 ккал"],
            6: ["Отдых / Учеба", "Растяжка 10 мин (по желанию)"],
            0: ["Прогулка (шаги)", "Батут в удовольствие", "План питания"]
        };

        const daysRu = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];

        function getTodayKey() { return new Date().getDay(); }
        function getDateString() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        }
        function getYesterdayString() {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        }

        function init() {
            const dayKey = getTodayKey();
            document.getElementById('dayName').innerText = daysRu[dayKey];
            
            const listContainer = document.getElementById('taskList');
            listContainer.innerHTML = '';

            plans[dayKey].forEach((task, index) => {
                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerHTML = `
                    <input type="checkbox" id="task${index}" onchange="checkTasks()">
                    <label for="task${index}">${task}</label>
                `;
                listContainer.appendChild(div);
            });

            checkStreak();
            updateUI();
        }

        function checkTasks() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            const btn = document.getElementById('actionBtn');
            const today = getDateString();
            const lastDate = localStorage.getItem('lastDoneDate');

            if (lastDate === today) {
                btn.disabled = true;
                btn.innerText = "День зачтен! ✅";
            } else {
                btn.disabled = !allChecked;
                btn.innerText = allChecked ? "Завершить день" : "Выполни план";
            }
        }

        function checkStreak() {
            let streak = parseInt(localStorage.getItem('myStreak')) || 0;
            let lastDate = localStorage.getItem('lastDoneDate');
            const today = getDateString();
            const yesterday = getYesterdayString();

            // Если последний зачет был не сегодня и не вчера — сброс
            if (lastDate && lastDate !== today && lastDate !== yesterday) {
                streak = 0;
                localStorage.setItem('myStreak', streak);
            }
            document.getElementById('streakDisplay').innerText = streak;
        }

        function markDayDone() {
            let streak = parseInt(localStorage.getItem('myStreak')) || 0;
            const lastDate = localStorage.getItem('lastDoneDate');
            const today = getDateString();
            const yesterday = getYesterdayString();

            if (lastDate === today) return;

            if (lastDate === yesterday || streak === 0) {
                streak++;
            } else {
                streak = 1;
            }

            localStorage.setItem('myStreak', streak);
            localStorage.setItem('lastDoneDate', today);
            
            if (navigator.vibrate) navigator.vibrate([100, 30, 100]);
            
            init();
        }

        function updateUI() {
            const today = getDateString();
            const lastDate = localStorage.getItem('lastDoneDate');
            if (lastDate === today) {
                const checkboxes = document.querySelectorAll('input[type="checkbox"]');
                checkboxes.forEach(cb => {
                    cb.checked = true;
                    cb.disabled = true;
                });
                document.getElementById('actionBtn').disabled = true;
                document.getElementById('actionBtn').innerText = "День зачтен! ✅";
                document.getElementById('statusText').innerText = "Отдыхай, ты сегодня молодец!";
            }
        }

        init();
    </script>
</body>
</html>
