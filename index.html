<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>ДТП-СФЕРА</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f2f2f7;
}

/* container */

.container{
max-width:430px;
margin:auto;
padding:env(safe-area-inset-top) 14px 120px;
}

/* header */

.header{
font-size:26px;
font-weight:700;
margin-bottom:12px;
}

/* stats */

.stats{
display:flex;
gap:8px;
margin-bottom:16px;
flex-wrap:wrap;
}

.stat{
flex:1;
min-width:90px;
background:white;
padding:10px;
border-radius:14px;
text-align:center;
font-size:13px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.stat span{
font-size:18px;
font-weight:600;
display:block;
}

/* search */

.search input{
width:100%;
padding:14px;
border-radius:16px;
border:none;
font-size:16px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:16px;
}

/* card */

.card{
display:flex;
align-items:center;
background:white;
border-radius:18px;
padding:14px;
margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
position:relative;
}

.avatar{
width:46px;
height:46px;
border-radius:50%;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
margin-right:12px;
}

.info{flex:1}

.name{font-weight:600;font-size:16px}

.meta{font-size:14px;color:#666}

/* money */

.money{
position:absolute;
right:10px;
top:10px;
font-size:20px;
cursor:pointer;
opacity:.4;
}

.money.paid{
opacity:1;
}

/* fab */

.fab{
position:fixed;
right:18px;
bottom:30px;
width:60px;
height:60px;
border-radius:50%;
background:#007AFF;
color:white;
font-size:32px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
cursor:pointer;
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.35);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.form{
background:white;
border-radius:20px;
padding:20px;
width:100%;
max-width:360px;
}

.field{
margin-bottom:12px;
}

.field label{
font-size:13px;
display:block;
margin-bottom:4px;
}

.field input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

.form button{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#007AFF;
color:white;
font-size:16px;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<div class="header">ДТП-СФЕРА</div>

<div class="stats">

<div class="stat">
<span id="statToday">0</span>
Сегодня
</div>

<div class="stat">
<span id="statYesterday">0</span>
Вчера
</div>

<div class="stat">
<span id="statTotal">0</span>
Всего
</div>

<div class="stat">
<span id="statPaid">0</span>
Оплачено
</div>

</div>

<div class="search">
<input id="searchInput" placeholder="Поиск клиент / номер / телефон">
</div>

<div id="list"></div>

</div>

<div class="fab" onclick="openForm()">+</div>

<div class="modal" id="modal">

<div class="form">

<div class="field">
<label>ФИО клиента</label>
<input id="nameInput">
</div>

<div class="field">
<label>Марка автомобиля</label>
<input id="brandInput">
</div>

<div class="field">
<label>Госномер</label>
<input id="numberInput">
</div>

<div class="field">
<label>Телефон</label>
<input id="phoneInput">
</div>

<button onclick="saveClient()">Сохранить</button>

</div>

</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients")) || []
let editingId=null

const list=document.getElementById("list")
const modal=document.getElementById("modal")

const nameInput=document.getElementById("nameInput")
const brandInput=document.getElementById("brandInput")
const numberInput=document.getElementById("numberInput")
const phoneInput=document.getElementById("phoneInput")

const searchInput=document.getElementById("searchInput")

function saveStorage(){
localStorage.setItem("clients",JSON.stringify(clients))
}

/* random avatar color */

function randomColor(){

const colors=[
"#007AFF",
"#5856D6",
"#FF9500",
"#34C759",
"#FF2D55"
]

return colors[Math.floor(Math.random()*colors.length)]

}

/* stats */

function updateStats(){

let today=new Date()
let yesterday=new Date()
yesterday.setDate(today.getDate()-1)

let todayCount=0
let yesterdayCount=0
let paid=0

clients.forEach(c=>{

let d=new Date(c.date)

if(d.toDateString()==today.toDateString()) todayCount++

if(d.toDateString()==yesterday.toDateString()) yesterdayCount++

if(c.paid) paid++

})

document.getElementById("statToday").textContent=todayCount
document.getElementById("statYesterday").textContent=yesterdayCount
document.getElementById("statTotal").textContent=clients.length
document.getElementById("statPaid").textContent=paid

}

/* render */

function render(data){

list.innerHTML=""

data.forEach(c=>{

let initials=c.name.split(" ").map(x=>x[0]).join("").slice(0,2)

let moneyClass=c.paid?"money paid":"money"

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="avatar" style="background:${c.color}">${initials}</div>

<div class="info">

<div class="name">${c.name}</div>

<div class="meta">🚗 ${c.brand}</div>

<div class="meta">🔢 ${c.number}</div>

<div class="meta">📞 ${c.phone}</div>

</div>

<div class="${moneyClass}">💵</div>

`

/* toggle paid */

card.querySelector(".money").onclick=(e)=>{

e.stopPropagation()

c.paid=!c.paid

saveStorage()

render(clients)

}

/* edit */

card.onclick=()=>openForm(c)

/* swipe delete */

let startX

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>120){

if(confirm("Удалить клиента?")){

clients=clients.filter(x=>x.id!==c.id)

saveStorage()

render(clients)

}

}

})

list.appendChild(card)

})

updateStats()

}

/* open form */

function openForm(client){

modal.style.display="flex"

if(client){

editingId=client.id

nameInput.value=client.name
brandInput.value=client.brand
numberInput.value=client.number
phoneInput.value=client.phone

}else{

editingId=null

nameInput.value=""
brandInput.value=""
numberInput.value=""
phoneInput.value=""

}

}

/* save */

function saveClient(){

let n=nameInput.value.trim()
let b=brandInput.value.trim()
let num=numberInput.value.trim()
let p=phoneInput.value.trim()

if(!n||!b||!num||!p)return

if(editingId){

let c=clients.find(x=>x.id===editingId)

c.name=n
c.brand=b
c.number=num
c.phone=p

}else{

clients.push({

id:Date.now(),
name:n,
brand:b,
number:num,
phone:p,
color:randomColor(),
paid:false,
date:new Date()

})

}

saveStorage()

render(clients)

modal.style.display="none"

}

/* search */

searchInput.oninput=e=>{

let q=e.target.value.toLowerCase()

let filtered=clients.filter(c=>

c.name.toLowerCase().includes(q)||
c.number.toLowerCase().includes(q)||
c.phone.toLowerCase().includes(q)

)

render(filtered)

}

render(clients)

</script>

</body>
</html>
