<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ДТП Эксперт</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(180deg,#ffffff,#f4f6f9);
color:#111;
}

/* container */

.container{
max-width:430px;
margin:auto;
padding:20px 16px 140px;
}

/* header */

.header{
font-size:32px;
font-weight:700;
letter-spacing:-0.5px;
margin-bottom:20px;
}

/* search */

.search input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
font-size:16px;
background:white;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* cards */

.card{
background:white;
border-radius:20px;
padding:18px;
margin-bottom:14px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
transition:.25s;
}

.card:hover{
transform:translateY(-2px);
}

.name{
font-size:19px;
font-weight:700;
margin-bottom:8px;
}

.row{
font-size:15px;
opacity:.8;
margin-top:3px;
}

/* buttons */

.btn{
position:fixed;
right:20px;
border-radius:18px;
padding:16px 22px;
font-weight:600;
box-shadow:0 15px 30px rgba(0,0,0,0.25);
cursor:pointer;
backdrop-filter:blur(10px);
}

.clientBtn{
bottom:30px;
background:#007AFF;
color:white;
}

.callBtn{
bottom:95px;
background:white;
color:#111;
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.35);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.form{
background:white;
border-radius:24px;
padding:22px;
width:100%;
max-width:360px;
box-shadow:0 30px 60px rgba(0,0,0,0.25);
}

.field{
margin-bottom:14px;
}

.field label{
font-size:13px;
opacity:.7;
display:block;
margin-bottom:4px;
}

.field input,.field textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #e5e5e5;
font-size:14px;
}

textarea{
resize:none;
height:80px;
}

.form button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#007AFF;
color:white;
font-size:16px;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<div class="header">ДТП Эксперт</div>

<div class="search">
<input id="searchInput" placeholder="Поиск клиент / номер / телефон">
</div>

<div id="list"></div>

</div>

<!-- buttons -->

<div class="btn callBtn" onclick="openCall()">Колл Центр</div>
<div class="btn clientBtn" onclick="openForm()">Клиенты</div>

<!-- CLIENT MODAL -->

<div class="modal" id="modal">

<div class="form">

<div class="field">
<label>ФИО клиента</label>
<input id="nameInput">
</div>

<div class="field">
<label>Марка автомобиля</label>
<input id="brandInput">
</div>

<div class="field">
<label>Госномер</label>
<input id="numberInput">
</div>

<div class="field">
<label>Телефон</label>
<input id="phoneInput">
</div>

<button onclick="saveClient()">Сохранить</button>

</div>

</div>

<!-- CALL CENTER MODAL -->

<div class="modal" id="callModal">

<div class="form">

<div class="field">
<label>Имя клиента</label>
<input id="callName">
</div>

<div class="field">
<label>Телефон</label>
<input id="callPhone">
</div>

<div class="field">
<label>Комментарий</label>
<textarea id="callComment"></textarea>
</div>

<button onclick="sendTelegram()">Открыть Telegram</button>

</div>

</div>

<script>

let clients=JSON.parse(localStorage.getItem("clients"))||[]
let editingId=null

const list=document.getElementById("list")

function saveStorage(){
localStorage.setItem("clients",JSON.stringify(clients))
}

/* render */

function render(data){

list.innerHTML=""

data.forEach(c=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="name">${c.name}</div>
<div class="row">Марка: ${c.brand}</div>
<div class="row">Гос номер: ${c.number}</div>
<div class="row">Телефон: ${c.phone}</div>

`

card.onclick=()=>openForm(c)

list.appendChild(card)

})

}

/* client form */

function openForm(client){

modal.style.display="flex"

if(client){

editingId=client.id

nameInput.value=client.name
brandInput.value=client.brand
numberInput.value=client.number
phoneInput.value=client.phone

}else{

editingId=null

nameInput.value=""
brandInput.value=""
numberInput.value=""
phoneInput.value=""

}

}

function saveClient(){

let n=nameInput.value.trim()
let b=brandInput.value.trim()
let num=numberInput.value.trim()
let p=phoneInput.value.trim()

if(!n||!b||!num||!p)return

if(editingId){

let c=clients.find(x=>x.id===editingId)

c.name=n
c.brand=b
c.number=num
c.phone=p

}else{

clients.push({

id:Date.now(),
name:n,
brand:b,
number:num,
phone:p

})

}

saveStorage()

render(clients)

modal.style.display="none"

}

/* call center */

function openCall(){
callModal.style.display="flex"
}

function sendTelegram(){

let name=callName.value
let phone=callPhone.value
let comment=callComment.value

let text=`Новый клиент
Имя: ${name}
Телефон: ${phone}
Комментарий: ${comment}`

let url=`https://t.me/Irishka_0923?text=${encodeURIComponent(text)}`

window.open(url,"_blank")

}

/* search */

searchInput.oninput=e=>{

let q=e.target.value.toLowerCase()

let filtered=clients.filter(c=>

c.name.toLowerCase().includes(q)||
c.number.toLowerCase().includes(q)||
c.phone.toLowerCase().includes(q)

)

render(filtered)

}

render(clients)

</script>

</body>
</html>
